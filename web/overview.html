<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZB202 Digital Twin | Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body data-page="overview">
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <div class="page-shell">
    <header class="hero">
      <div class="hero-topbar">
        <p class="eyebrow" data-i18n="overview.eyebrow">ZB202 / 建筑数字孪生</p>
        <div class="hero-actions">
          <a class="btn" href="twin.html">房间视图</a>
          <a class="btn" href="xeokit.html">xeokit 版本</a>
          <button id="lang-toggle" class="btn btn-quiet" type="button">EN</button>
        </div>
      </div>

      <h1 class="hero-title" data-i18n="overview.title">空间设备总览</h1>

      <div class="hero-meta">
        <div>
          <p class="kicker" data-i18n="common.room">房间</p>
          <p class="hero-value">ZB202</p>
        </div>
        <div>
          <p class="kicker" data-i18n="common.devices">设备数</p>
          <p class="hero-value" id="device-count">0</p>
        </div>
        <div class="hero-note">
          <p data-i18n="overview.note">当前为演示占位数据，后续将接入实时 IoT 与 BIM 状态。</p>
        </div>
      </div>
    </header>

    <section class="view-switch-wrap">
      <div class="segmented" role="tablist" aria-label="View Mode">
        <button class="seg active" data-view="card" type="button" data-i18n="overview.viewCard">卡片</button>
        <button class="seg" data-view="table" type="button" data-i18n="overview.viewTable">表格</button>
      </div>
    </section>

    <main>
      <section id="card-view" class="grid-view"></section>

      <section id="table-view" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th data-i18n="common.name">设备名</th>
              <th data-i18n="common.id">编号</th>
              <th data-i18n="common.location">位置</th>
              <th data-i18n="common.status">状态</th>
              <th data-i18n="common.lastMaintenance">最近检修</th>
              <th data-i18n="common.action">操作</th>
            </tr>
          </thead>
          <tbody id="device-table-body"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script type="module" src="src/data/devices.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
